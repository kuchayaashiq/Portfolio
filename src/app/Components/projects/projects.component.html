<section id="projects" class="py-20 px-4 bg-slate-800/50">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-16" data-aos="fade-up">
      <h2 class="text-4xl md:text-5xl font-bold text-white mb-4">
        Featured <span
          class="bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Projects</span>
      </h2>
      <div class="w-24 h-1 bg-gradient-to-r from-purple-400 to-pink-400 mx-auto rounded-full"></div>
    </div>

    <!-- Featured Projects -->
    <div class="space-y-12 mb-16">
      <div *ngFor="let project of featuredProjects; let i = index"
        [ngClass]="i % 2 === 0 ? 'lg:flex-row' : 'lg:flex-row-reverse'" class="flex flex-col lg:flex gap-8 items-center"
        data-aos="fade-up" [attr.data-aos-delay]="i * 200">

        <!-- Project Image -->
        <div class="lg:w-1/2">
          <div class="relative group">
            <div
              class="absolute inset-0 bg-gradient-to-r from-purple-600/20 to-pink-600/20 rounded-xl transform group-hover:scale-105 transition-transform duration-300">
            </div>
            <img [src]="project.image" [alt]="project.title"
              class="w-full h-64 object-cover rounded-xl relative z-10 shadow-lg">
            <div
              class="absolute inset-0 bg-slate-900/0 group-hover:bg-slate-900/10 rounded-xl transition-colors duration-300 z-20">
            </div>
          </div>
        </div>

        <!-- Project Details -->
        <div class="lg:w-1/2 space-y-6">
          <div>
            <h3 class="text-2xl font-bold text-white mb-3">{{ project.title }}</h3>
            <p class="text-gray-300 leading-relaxed">{{ project.description }}</p>
          </div>

          <!-- Technologies -->
          <div class="flex flex-wrap gap-2">
            <span *ngFor="let tech of project.technologies"
              class="px-3 py-1 bg-purple-500/20 text-purple-300 rounded-full text-sm font-medium">
              {{ tech }}
            </span>
          </div>

          <!-- Project Links -->
          <div class="flex space-x-4">
            <a [href]="project.demoUrl" target="_blank"
              class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold rounded-lg hover:from-purple-600 hover:to-pink-600 transform hover:scale-105 transition-all duration-300">
              <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
              </svg>
              Live Demo
            </a>
            <a [href]="project.githubUrl" target="_blank"
              class="inline-flex items-center px-6 py-3 border-2 border-purple-400 text-purple-400 font-semibold rounded-lg hover:bg-purple-400 hover:text-white transform hover:scale-105 transition-all duration-300">
              <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
              </svg>
              GitHub
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Other Projects Grid -->
    <div class="grid md:grid-cols-2 gap-8">
      <div *ngFor="let project of otherProjects; let i = index" data-aos="fade-up" [attr.data-aos-delay]="i * 100"
        class="bg-slate-800/50 backdrop-blur-sm rounded-xl overflow-hidden border border-slate-700/50 hover:border-purple-500/50 transition-all duration-300 hover:transform hover:scale-105 group">

        <div class="relative overflow-hidden">
          <img [src]="project.image" [alt]="project.title"
            class="w-full h-48 object-cover group-hover:scale-110 transition-transform duration-300">
          <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
        </div>

        <div class="p-6">
          <h3 class="text-xl font-bold text-white mb-2">{{ project.title }}</h3>
          <p class="text-gray-300 text-sm mb-4 line-clamp-3">{{ project.description }}</p>

          <div class="flex flex-wrap gap-2 mb-4">
            <span *ngFor="let tech of project.technologies.slice(0, 3)"
              class="px-2 py-1 bg-purple-500/20 text-purple-300 rounded text-xs">
              {{ tech }}
            </span>
          </div>

          <div class="flex space-x-3">
            <a [href]="project.demoUrl" target="_blank"
              class="flex-1 text-center py-2 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold rounded-lg hover:from-purple-600 hover:to-pink-600 transition-all duration-300 text-sm">
              Demo
            </a>
            <a [href]="project.githubUrl" target="_blank"
              class="flex-1 text-center py-2 border border-purple-400 text-purple-400 font-semibold rounded-lg hover:bg-purple-400 hover:text-white transition-all duration-300 text-sm">
              Code
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
