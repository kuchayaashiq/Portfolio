<section id="skills" class="py-20 px-4">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-16" data-aos="fade-up">
      <h2 class="text-4xl md:text-5xl font-bold text-white mb-4">
        My <span class="bg-linear-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">Skills</span>
      </h2>
      <div class="w-24 h-1 bg-linear-to-r from-purple-400 to-pink-400 mx-auto rounded-full"></div>
    </div>

    <!-- Category Filter -->
    <div class="flex flex-wrap justify-center gap-4 mb-12" data-aos="fade-up" data-aos-delay="200">
      <button *ngFor="let category of categories" (click)="selectCategory(category)" [ngClass]="selectedCategory === category ? 
                'bg-linear-to-r from-purple-500 to-pink-500 text-white' : 
                'bg-slate-800 text-gray-300 hover:bg-slate-700'"
        class="px-6 py-3 rounded-full font-semibold transition-all duration-300 transform hover:scale-105">
        {{ category }}
      </button>
    </div>

    <!-- Skills Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let skill of filteredSkills; let i = index" data-aos="fade-up" [attr.data-aos-delay]="i * 100" class="bg-slate-800/50 backdrop-blur-sm rounded-xl p-6 border border-slate-700/50 hover:border-purple-500/50 
                  transition-all duration-300 hover:transform hover:scale-105 group">

        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center space-x-3">
            <span class="text-2xl">{{ skill.icon }}</span>
            <span class="text-white font-semibold">{{ skill.name }}</span>
          </div>
          <span class="text-purple-400 font-bold">{{ skill.level }}%</span>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-700 rounded-full h-3 overflow-hidden">
          <div
            class="bg-linear-to-r from-purple-500 to-pink-500 h-full rounded-full transition-all duration-1000 ease-out group-hover:animate-pulse"
            [style.width.%]="skill.level">
          </div>
        </div>

        <!-- Category Badge -->
        <div class="mt-4">
          <span class="inline-block px-3 py-1 text-xs font-semibold bg-purple-500/20 text-purple-300 rounded-full">
            {{ skill.category }}
          </span>
        </div>
      </div>
    </div>
  </div>
</section>
