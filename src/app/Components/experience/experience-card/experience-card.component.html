<div [ngClass]="index % 2 === 0 ? 'md:mr-auto md:pr-8' : 'md:ml-auto md:pl-8'" class="ml-12 md:ml-0 md:w-1/2">
  <div class="relative group">
    <!-- Card with enhanced design -->
    <div class="relative bg-slate-800/50 backdrop-blur-xl border border-slate-700/50 rounded-xl p-6 transition-all duration-500 
      hover:border-purple-500/50 hover:shadow-[0_0_30px_rgba(168,85,247,0.15)] group-hover:translate-y-[-2px]">

      <!-- Gradient background effect -->
      <div class="absolute inset-0 bg-linear-to-br from-purple-500/5 via-transparent to-pink-500/5 rounded-xl"></div>

      <!-- Top border gradient -->
      <div class="absolute top-0 left-0 w-full h-px bg-linear-to-r from-transparent via-purple-500/50 to-transparent">
      </div>

      <!-- Content container -->
      <div class="relative">
        <!-- Header -->
        <div class="flex flex-wrap items-start justify-between mb-6">
          <div class="flex-1 min-w-0">
            <!-- Position Title with gradient effect -->
            <h3
              class="text-xl font-bold bg-linear-to-r from-white via-white to-gray-200 bg-clip-text text-transparent 
              group-hover:from-purple-400 group-hover:via-pink-400 group-hover:to-purple-400 transition-all duration-300">
              {{ experience.position }}
            </h3>
            <!-- Company and Location -->
            <div class="flex flex-wrap items-center gap-2 mt-2">
              <span class="text-purple-400 font-semibold hover:text-purple-300 transition-colors duration-300">
                {{ experience.company }}
              </span>
              <span class="text-gray-500">•</span>
              <span class="text-gray-400 hover:text-gray-300 transition-colors duration-300">
                {{ experience.location }}
              </span>
            </div>
          </div>

          <!-- Enhanced Employment Type Badge -->
          <div class="relative">
            <span [ngClass]="getTypeColor(experience.type)" class="inline-flex items-center px-4 py-1.5 rounded-full text-xs font-medium border-2 capitalize backdrop-blur-sm
              shadow-lg transition-all duration-300 hover:scale-105">
              {{ experience.type.replace('-', ' ') }}
              <span *ngIf="experience.current" class="ml-2 flex items-center">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
              </span>
            </span>
          </div>
        </div>

        <!-- Duration with enhanced design -->
        <div class="flex items-center mb-6 bg-slate-800/50 backdrop-blur-sm px-4 py-2 rounded-lg border border-slate-700/30
          hover:border-purple-500/30 transition-all duration-300">
          <fa-icon [icon]="['fas', 'calendar']" class="text-purple-400 mr-2"></fa-icon>
          <span class="text-gray-300 font-medium">{{ experience.duration }}</span>
        </div>

        <!-- Description -->
        <div class="mb-6">
          <h4 class="text-white font-semibold mb-3 flex items-center">
            <svg class="w-4 h-4 text-purple-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2">
              </path>
            </svg>
            Key Responsibilities
          </h4>
          <ul class="space-y-2">
            <li *ngFor="let desc of experience.description" class="text-gray-300 text-sm flex items-start">
              <span class="w-2 h-2 bg-purple-400 rounded-full mt-2 mr-3 flex-shrink-0"></span>
              {{ desc }}
            </li>
          </ul>
        </div>

        <!-- Technologies -->
        <div class="mb-6">
          <h4 class="text-white font-semibold mb-3 flex items-center">
            <svg class="w-4 h-4 text-purple-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
            </svg>
            Technologies Used
          </h4>
          <div class="flex flex-wrap gap-2">
            <span *ngFor="let tech of experience.technologies"
              class="px-3 py-1 bg-purple-500/20 text-purple-300 rounded-full text-xs font-medium border border-purple-500/20 hover:bg-purple-500/30 transition-colors duration-300">
              {{ tech }}
            </span>
          </div>
        </div>

        <!-- Key Achievements -->
        <div class="border-t border-slate-700/50 pt-4">
          <h4 class="text-white font-semibold mb-3 flex items-center">
            <svg class="w-4 h-4 text-purple-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z">
              </path>
            </svg>
            Key Achievements
          </h4>
          <ul class="space-y-2">
            <li *ngFor="let achievement of experience.achievements" class="text-gray-300 text-sm flex items-start">
              <span class="w-2 h-2 bg-pink-400 rounded-full mt-2 mr-3 flex-shrink-0"></span>
              {{ achievement }}
            </li>
          </ul>
        </div>

        <!-- Current Position Indicator -->
        <div *ngIf="experience.current" class="mt-4 flex items-center justify-center">
          <div
            class="bg-linear-to-r from-green-500/20 to-emerald-500/20 border border-green-500/30 rounded-full px-4 py-2">
            <span class="text-green-300 text-sm font-medium flex items-center">
              <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span>
              Current Position
            </span>
          </div>
        </div>
      </div>
    </div>
