<section id="home" class="min-h-screen flex items-center justify-center px-4 pt-10 relative overflow-hidden">
  <!-- Background decoration -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-pink-500/10 rounded-full blur-3xl"></div>
  </div>

  <div class="max-w-7xl mx-auto relative z-10">
    <div class="text-center">
      <!-- Profile Image -->
      <div class="mb-8" data-aos="zoom-in">
        <div class="w-48 h-48 mx-auto relative">
          <div class="absolute inset-0 bg-gradient-to-r from-purple-400 to-pink-400 rounded-full blur-sm opacity-75">
          </div>
          <img src="assets/logo.jpg" alt="Profile"
            class="w-full h-full object-cover rounded-full relative z-10 border-4 border-white/20">
        </div>
      </div>

      <!-- Main Heading -->
      <div data-aos="fade-up" data-aos-delay="200">
        <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold text-white mb-6">
          Hi, I'm
          <span class="bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
            Aashiq Hussain Kuchay
          </span>
        </h1>
      </div>

      <!-- Typewriter Effect -->
      <div data-aos="fade-up" data-aos-delay="400" class="mb-8">
        <p class="text-xl md:text-2xl text-gray-300 h-8">
          I'm a <span class="text-purple-400 font-semibold">{{ currentRole }}</span>
          <span class="animate-pulse text-purple-400">|</span>
        </p>
      </div>

      <!-- Description -->
      <div data-aos="fade-up" data-aos-delay="600" class="mb-12">
        <p class="text-lg text-gray-400 max-w-3xl mx-auto leading-relaxed">
          Passionate about creating innovative educational technology solutions and building
          exceptional user experiences with Angular, TypeScript, and modern web technologies.
        </p>
      </div>

      <!-- CTA Buttons -->
      <div data-aos="fade-up" data-aos-delay="800" class="flex flex-col sm:flex-row gap-4 justify-center">
        <button (click)="scrollToSection('projects')" class="group px-8 py-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold rounded-full 
                       hover:from-purple-600 hover:to-pink-600 transform hover:scale-105 transition-all duration-300 
                       shadow-lg hover:shadow-purple-500/25">
          <span class="flex items-center justify-center">
            View My Work
            <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
          </span>
        </button>

        <button (click)="scrollToSection('contact')" class="px-8 py-4 border-2 border-purple-400 text-purple-400 font-semibold rounded-full 
                       hover:bg-purple-400 hover:text-white transform hover:scale-105 transition-all duration-300">
          Get In Touch
        </button>
      </div>

      <!-- Scroll Indicator -->
      <div data-aos="fade-in" data-aos-delay="1000" class="absolute bottom-8 left-1/2 transform -translate-x-1/2">
        <div class="animate-bounce">
          <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
          </svg>
        </div>
      </div>
    </div>
  </div>
</section>
